{% extends 'base.html' %}
{% block content %}

<h2 id="head2">Login</h2>

<form method="POST" class="login-form">
    {% csrf_token %}
    <div class="login-form">
    <label for="staff_id" >staff_id &nbsp;&nbsp;&nbsp; </label>
    <input type="text" id="staff_id" name="staff_id" placeholder="staff id" required><br>
    <label for="pass">password</label>
    <input type="password" id="pass" name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
        </div>
</form>

{% if error %}
<p style="color:#ff2600;">{{ error }}</p>
{% endif %}

{% endblock %}
