{% extends 'base.html' %}
{% block content %}
<div class="form-container centered">
    <h1 id="head1">Admin Login</h1>
    <p class="note">Use the administrator credentials (Staff ID <strong>ADM0001</strong>, password <strong>2127</strong>) to access the dashboard, approve pending staff, review reports, and export attendance data.</p>

    <form method="POST" class="login-form">
        {% csrf_token %}
        <label for="staff_id">Admin ID</label>
        <input type="text" id="staff_id" name="staff_id" placeholder="ADM0001" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required>

        <button type="submit">Sign in</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>
{% endblock %}
